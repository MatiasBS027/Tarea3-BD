<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Control de Asistencia</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h1>Control de Asistencia y Planilla</h1>
            <h2>Iniciar Sesión</h2>

            <!-- Contenedor de mensajes de error/éxito -->
            <div id="message" class="message hidden"></div>

            <!-- Formulario de login -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario:</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Ingresa tu usuario"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Ingresa tu contraseña"
                        required
                    >
                </div>

                <!-- Mostrar si está bloqueado -->
                <div id="blockedMessage" class="blocked-message hidden">
                    <p>Tu cuenta está bloqueada temporalmente.</p>
                    <p>Tiempo restante: <span id="blockedTime">-</span> minutos</p>
                </div>

                <button type="submit" id="loginBtn" class="btn-submit">
                    Iniciar Sesión
                </button>
            </form>

            <!-- Spinner de carga -->
            <div id="loadingSpinner" class="spinner hidden"></div>
        </div>
    </div>

    <!-- Script del login compilado desde TypeScript -->
    <script type="module" src="js/login.js"></script>
</body>
</html>
