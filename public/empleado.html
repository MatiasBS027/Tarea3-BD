<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista de empleado - Sistema de Planilla</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="empleados-page">
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="sidebar-kicker" id="kicker">Impersonando</span>
                <h2 id="empleadoNombre">Empleado</h2>
                <p id="empleadoDocumento" class="sidebar-sub"></p>
            </div>

            <nav class="sidebar-nav">
                <button id="btnRegresarAdmin" class="sidebar-btn sidebar-btn-primary" type="button">
                    Regresar a admin
                </button>
            </nav>

            <div class="sidebar-footer">
                <button id="logoutBtn" class="sidebar-btn sidebar-btn-ghost" type="button">
                    Cerrar sesión
                </button>
            </div>
        </aside>

        <main class="page-content empleados-shell">
            <header class="empleados-header">
                <div>
                    <h1>Vista de empleado</h1>
                    <p class="subtitle">Estás impersonando a este empleado. La bitácora registra esta acción.</p>
                </div>
            </header>

            <section class="panel">
                <div class="panel-title">
                    <h2>Planilla semanal y mensual</h2>
                </div>
                <div id="estado" class="status info">
                    Aquí se cargará la planilla del empleado (R04 / R05). Pendiente de implementación por Sebastián.
                </div>
                <div id="contenidoEmpleado" class="detalle-contenido"></div>
            </section>
        </main>
    </div>

    <script type="module" src="js/empleado.js"></script>
</body>
</html>
